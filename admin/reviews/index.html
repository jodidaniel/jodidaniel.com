<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <!-- Neutral placeholder title for the un-rendered file; replaced at
       runtime from the injected window.CMS_SITE_TITLE (render-decap-config.rb
       writes it into <head> at build, from the site's _config.yml `title`),
       so the dashboard carries no hardcoded site identity. -->
  <title>Visual Regression Reviews — CMS</title>
  <script>
    // window.CMS_SITE_TITLE is injected ahead of this script (see
    // render-decap-config.rb). When present, brand the tab from the site's
    // configured title; otherwise keep the neutral placeholder above.
    if (window.CMS_SITE_TITLE) {
      document.title = 'Visual Regression Reviews — ' + window.CMS_SITE_TITLE;
    }
  </script>
  <style>
    :root {
      color-scheme: dark;
      --primary: #285aff;
      --bg-page: #04060f;
      --bg-surface: #060d1f;
      --bg-elevated: #0a1530;
      --bg-overlay: #111e40;
      --text-primary: #d8e4ff;
      --text-secondary: #c8d4f0;
      --text-muted: #8ab0e8;
      --border-subtle: #1a2a5e;
      --border-default: #2a3a7e;
      --success: #22c27a;
      --error: #ff4d6d;
    }

    *, *::before, *::after { box-sizing: border-box; }

    html, body {
      height: 100%; margin: 0; padding: 0;
      background: var(--bg-page);
      color: var(--text-primary);
      font-family: 'Helvetica Neue', Arial, sans-serif;
    }

    body::before {
      content: '';
      position: fixed; inset: 0;
      background: radial-gradient(ellipse 70% 50% at 50% 20%, rgba(40,90,255,0.12), transparent 70%);
      pointer-events: none; z-index: 0;
    }

    .container {
      position: relative; z-index: 1;
      max-width: 960px; margin: 0 auto; padding: 2rem 1.5rem;
    }

    header {
      display: flex; align-items: center; justify-content: space-between;
      margin-bottom: 2rem; padding-bottom: 1rem;
      border-bottom: 1px solid var(--border-subtle);
    }
    header h1 {
      font-size: 1.4rem; font-weight: 300;
      letter-spacing: 0.04em; margin: 0;
    }
    .header-actions { display: flex; gap: 0.75rem; align-items: center; }

    .btn {
      display: inline-flex; align-items: center; gap: 0.4rem;
      padding: 0.5rem 1rem; border: 1px solid var(--border-default);
      border-radius: 6px; background: var(--bg-elevated);
      color: var(--text-secondary); font-size: 0.8rem;
      cursor: pointer; text-decoration: none;
      transition: border-color 0.2s, background 0.2s;
    }
    .btn:hover { border-color: var(--primary); background: var(--bg-overlay); }
    .btn-approve {
      background: rgba(34,194,122,0.12); border-color: rgba(34,194,122,0.3);
      color: var(--success);
    }
    .btn-approve:hover { background: rgba(34,194,122,0.22); border-color: var(--success); }
    .btn-reject {
      background: rgba(255,77,109,0.1); border-color: rgba(255,77,109,0.25);
      color: var(--error);
    }
    .btn-reject:hover { background: rgba(255,77,109,0.2); border-color: var(--error); }

    .user-info {
      font-size: 0.75rem; color: var(--text-muted);
    }

    #auth-screen {
      display: flex; flex-direction: column; align-items: center;
      justify-content: center; min-height: 60vh; gap: 1.5rem;
      text-align: center;
    }
    #auth-screen h2 { font-weight: 200; font-size: 1.6rem; margin: 0; }
    #auth-screen p { color: var(--text-muted); margin: 0; font-size: 0.9rem; }
    #login-btn {
      padding: 0.7rem 2rem; border-radius: 8px;
      background: var(--primary); border: none;
      color: white; font-size: 0.9rem; cursor: pointer;
      transition: opacity 0.2s;
    }
    #login-btn:hover { opacity: 0.85; }

    .review-card {
      background: var(--bg-surface);
      border: 1px solid var(--border-subtle);
      border-radius: 10px; padding: 1.5rem;
      margin-bottom: 1.5rem;
      transition: border-color 0.2s;
    }
    .review-card:hover { border-color: var(--border-default); }

    .review-header {
      display: flex; justify-content: space-between;
      align-items: flex-start; margin-bottom: 1rem;
    }
    .review-title {
      font-size: 1.1rem; font-weight: 400; margin: 0 0 0.3rem;
    }
    .review-title a {
      color: var(--text-primary); text-decoration: none;
    }
    .review-title a:hover { color: var(--primary); }
    .review-meta {
      font-size: 0.75rem; color: var(--text-muted);
      font-family: 'SF Mono', 'Fira Code', monospace;
    }
    .review-meta span { margin-right: 1rem; }

    .review-video {
      margin: 1rem 0; border-radius: 8px; overflow: hidden;
      border: 1px solid var(--border-subtle);
      background: #000;
    }
    .review-video video {
      width: 100%; display: block;
    }

    .review-actions {
      display: flex; gap: 0.75rem; align-items: center;
      flex-wrap: wrap;
    }

    .reject-form {
      display: none; width: 100%; margin-top: 0.75rem;
    }
    .reject-form textarea {
      width: 100%; min-height: 60px; padding: 0.6rem;
      background: var(--bg-elevated); border: 1px solid var(--border-default);
      border-radius: 6px; color: var(--text-primary);
      font-family: inherit; font-size: 0.85rem; resize: vertical;
    }
    .reject-form textarea::placeholder { color: var(--text-muted); }
    .reject-form-actions {
      display: flex; gap: 0.5rem; margin-top: 0.5rem;
    }

    .empty-state {
      text-align: center; padding: 4rem 1rem;
      color: var(--text-muted); font-size: 0.95rem;
    }
    .empty-state p:first-child {
      font-size: 2rem; margin-bottom: 0.5rem; opacity: 0.3;
    }

    .status-badge {
      display: inline-block; padding: 0.15rem 0.5rem;
      border-radius: 4px; font-size: 0.7rem;
      text-transform: uppercase; letter-spacing: 0.06em;
    }
    .status-waiting {
      background: rgba(40,90,255,0.15); color: var(--primary);
    }

    .stat-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(140px, 1fr));
      gap: 0.75rem;
      margin: 1rem 0;
    }
    .stat-card {
      background: var(--bg-elevated);
      border: 1px solid var(--border-subtle);
      border-radius: 6px;
      padding: 0.75rem 1rem;
    }
    .stat-card .stat-label {
      font-size: 0.7rem; text-transform: uppercase;
      letter-spacing: 0.06em; color: var(--text-muted);
      margin: 0 0 0.3rem;
    }
    .stat-card .stat-value {
      font-size: 1.5rem; font-weight: 200;
      color: var(--text-primary); margin: 0;
      font-family: 'SF Mono', 'Fira Code', monospace;
    }
    .stat-card.stat-different .stat-value { color: var(--error); }
    .stat-card.stat-identical .stat-value { color: var(--success); }
    .stat-card.stat-affected .stat-value { color: var(--text-secondary); }

    .stat-pages {
      margin: 0.5rem 0 0;
      font-size: 0.75rem;
      color: var(--text-muted);
      font-family: 'SF Mono', 'Fira Code', monospace;
      word-break: break-all;
    }
    .stat-pages-loading {
      font-size: 0.75rem;
      color: var(--text-muted);
      font-style: italic;
      margin: 0.5rem 0 0;
    }

    .spinner {
      display: inline-block; width: 14px; height: 14px;
      border: 2px solid transparent; border-top-color: currentColor;
      border-radius: 50%; animation: spin 0.6s linear infinite;
    }
    @keyframes spin { to { transform: rotate(360deg); } }

    .toast {
      position: fixed; bottom: 2rem; left: 50%;
      transform: translateX(-50%); padding: 0.7rem 1.5rem;
      background: var(--bg-overlay); border: 1px solid var(--border-default);
      border-radius: 8px; color: var(--text-primary);
      font-size: 0.85rem; z-index: 9999;
      opacity: 0; transition: opacity 0.3s;
    }
    .toast.visible { opacity: 1; }
  </style>
</head>
<body>
  <div class="container">
    <div id="auth-screen" style="display:none">
      <h2>Visual Regression Reviews</h2>
      <p>Sign in with GitHub to review pending visual regressions.</p>
      <button id="login-btn">Sign in with GitHub</button>
    </div>

    <div id="dashboard" style="display:none">
      <header>
        <div>
          <h1>Visual Regression Reviews</h1>
          <span class="user-info" id="user-info"></span>
        </div>
        <div class="header-actions">
          <a href="/admin/reviews/health.html" class="btn">QA health</a>
          <a href="/admin/" class="btn">Back to CMS</a>
          <button class="btn" id="refresh-btn">Refresh</button>
        </div>
      </header>
      <div id="reviews-list"></div>
    </div>

    <div id="loading" style="text-align:center;padding:4rem;">
      <div class="spinner" style="width:24px;height:24px;border-width:3px;color:var(--primary);margin:0 auto 1rem;"></div>
      <p style="color:var(--text-muted);font-size:0.85rem;">Loading...</p>
    </div>
  </div>

  <div class="toast" id="toast"></div>

  <script>
    // Site identity is injected at build by scripts/render-decap-config.rb
    // (window.CMS_REPO / CMS_APEX / CMS_OAUTH_BASE_URL — derived from
    // _config.yml's cms.repository, url host, and cms.oauth_base_url),
    // mirroring how admin/index.html consumes the same globals. No
    // hardcoded site identity here so the platform stays site-agnostic.
    const REPO_PARTS = String(window.CMS_REPO || '').split('/');
    const REPO_OWNER = REPO_PARTS[0] || '';
    const REPO_NAME = REPO_PARTS[1] || '';
    const APEX_DOMAIN = window.CMS_APEX || '';
    const API = 'https://api.github.com';
    const OAUTH_URL = (window.CMS_OAUTH_BASE_URL || '') + '/prod/auth';
    const TOKEN_KEY = 'gh_reviews_token';

    let refreshTimer = null;

    function getToken() { return localStorage.getItem(TOKEN_KEY); }
    function setToken(t) { localStorage.setItem(TOKEN_KEY, t); }
    function clearToken() { localStorage.removeItem(TOKEN_KEY); }

    async function ghFetch(path, opts = {}) {
      const token = getToken();
      const res = await fetch(`${API}${path}`, {
        ...opts,
        headers: {
          'Authorization': `token ${token}`,
          'Accept': 'application/vnd.github+json',
          ...(opts.headers || {}),
        },
      });
      if (res.status === 401) {
        clearToken();
        showAuth();
        throw new Error('Token expired');
      }
      return res;
    }

    function show(id) {
      ['auth-screen', 'dashboard', 'loading'].forEach(x => {
        document.getElementById(x).style.display = x === id ? '' : 'none';
      });
    }

    function showAuth() {
      show('auth-screen');
      if (refreshTimer) { clearInterval(refreshTimer); refreshTimer = null; }
    }

    function showToast(msg, duration) {
      const el = document.getElementById('toast');
      el.textContent = msg;
      el.classList.add('visible');
      setTimeout(() => el.classList.remove('visible'), duration || 3000);
    }

    document.getElementById('login-btn').addEventListener('click', () => {
      const w = 600, h = 700;
      const left = (screen.width - w) / 2;
      const top = (screen.height - h) / 2;
      const popup = window.open(OAUTH_URL, 'github-auth',
        `width=${w},height=${h},left=${left},top=${top}`);

      // Decap / Netlify CMS handshake. The OAuth proxy popup
      // (oauth-proxy/lambda.py) won't release the token until it sees the
      // opener echo back its "authorizing:<provider>" message. Skipping the
      // reply leaves the popup spinning on "Completing authorisation…"
      // forever, which is what the original `e.data?.token` listener did.
      window.addEventListener('message', function handler(e) {
        const data = e.data;
        if (typeof data !== 'string') return;

        if (data === 'authorizing:github') {
          if (popup && !popup.closed) popup.postMessage(data, e.origin);
          return;
        }

        const m = data.match(/^authorization:github:(success|error):(.*)$/s);
        if (!m) return;

        window.removeEventListener('message', handler);

        if (m[1] === 'error') {
          showToast('Authorization failed', 5000);
          if (popup && !popup.closed) popup.close();
          return;
        }

        let token;
        try { token = JSON.parse(m[2]).token; }
        catch { showToast('Authorization response was malformed', 5000); return; }

        if (!token) { showToast('Authorization succeeded but no token returned', 5000); return; }

        setToken(token);
        if (popup && !popup.closed) popup.close();
        init();
      });
    });

    document.getElementById('refresh-btn').addEventListener('click', loadReviews);

    async function init() {
      const token = getToken();
      if (!token) { showAuth(); return; }

      show('loading');
      try {
        const res = await ghFetch('/user');
        if (!res.ok) { showAuth(); return; }
        const user = await res.json();
        document.getElementById('user-info').textContent = `Signed in as ${user.login}`;
        show('dashboard');
        await loadReviews();
        if (refreshTimer) clearInterval(refreshTimer);
        refreshTimer = setInterval(loadReviews, 60000);
      } catch {
        showAuth();
      }
    }

    async function loadReviews() {
      const list = document.getElementById('reviews-list');

      try {
        const runsRes = await ghFetch(
          `/repos/${REPO_OWNER}/${REPO_NAME}/actions/runs?status=waiting&per_page=20`
        );
        const runsData = await runsRes.json();
        const runs = (runsData.workflow_runs || []).filter(r =>
          r.name === 'Visual Regression'
        );

        if (runs.length === 0) {
          list.innerHTML = `
            <div class="empty-state">
              <p>&#10003;</p>
              <p>No pending regression reviews.</p>
            </div>`;
          return;
        }

        let html = '';
        for (const run of runs) {
          const prNum = run.pull_requests?.[0]?.number;
          if (!prNum) continue;

          let pendingDeps = [];
          try {
            const depRes = await ghFetch(
              `/repos/${REPO_OWNER}/${REPO_NAME}/actions/runs/${run.id}/pending_deployments`
            );
            pendingDeps = await depRes.json();
          } catch { continue; }

          if (!pendingDeps.length) continue;

          let prTitle = `PR #${prNum}`;
          let prBranch = '';
          let prSha = run.head_sha?.slice(0, 7) || '';
          try {
            const prRes = await ghFetch(
              `/repos/${REPO_OWNER}/${REPO_NAME}/pulls/${prNum}`
            );
            const prData = await prRes.json();
            prTitle = prData.title || prTitle;
            prBranch = prData.head?.ref || '';
          } catch { /* use defaults */ }

          const videoUrl = `https://preview-pr${prNum}.${APEX_DOMAIN}/regression.mp4`;
          const diffsUrl = `https://preview-pr${prNum}.${APEX_DOMAIN}/regression.json`;
          const previewUrl = `https://preview-pr${prNum}.${APEX_DOMAIN}/`;
          const prUrl = `https://github.com/${REPO_OWNER}/${REPO_NAME}/pull/${prNum}`;
          const envId = pendingDeps[0]?.environment?.id;

          html += `
            <div class="review-card" data-run-id="${run.id}" data-env-id="${envId}" data-pr-num="${prNum}">
              <div class="review-header">
                <div>
                  <h3 class="review-title">
                    <a href="${prUrl}" target="_blank" rel="noopener">#${prNum} ${escapeHtml(prTitle)}</a>
                  </h3>
                  <div class="review-meta">
                    <span>${escapeHtml(prBranch)}</span>
                    <span>${prSha}</span>
                    <a href="${previewUrl}" target="_blank" rel="noopener" style="color:var(--primary);">Preview</a>
                  </div>
                </div>
                <span class="status-badge status-waiting">Awaiting Review</span>
              </div>
              <div class="review-stats" data-diffs-url="${diffsUrl}">
                <p class="stat-pages-loading">Loading visual-diff stats…</p>
              </div>
              <div class="review-video">
                <video controls preload="metadata" src="${videoUrl}"></video>
              </div>
              <div class="review-actions">
                <button class="btn btn-approve" onclick="approveRun(${run.id}, ${envId})">Approve</button>
                <button class="btn btn-reject" onclick="toggleReject(this)">Request Changes</button>
              </div>
              <div class="reject-form">
                <textarea placeholder="Describe the changes needed..."></textarea>
                <div class="reject-form-actions">
                  <button class="btn btn-reject" onclick="rejectRun(${run.id}, ${envId}, this)">Submit Rejection</button>
                  <button class="btn" onclick="toggleReject(this)">Cancel</button>
                </div>
              </div>
            </div>`;
        }

        list.innerHTML = html || `
          <div class="empty-state">
            <p>&#10003;</p>
            <p>No pending regression reviews.</p>
          </div>`;

        // Per-card visual-diff stats. Fetched separately because each
        // PR has its own regression.json on its preview subdomain — no
        // GitHub auth required, just a cross-origin GET.
        for (const node of list.querySelectorAll('.review-stats')) {
          renderStats(node);
        }
      } catch (err) {
        list.innerHTML = `
          <div class="empty-state">
            <p>!</p>
            <p>Failed to load reviews: ${escapeHtml(err.message)}</p>
          </div>`;
      }
    }

    async function renderStats(node) {
      const url = node.dataset.diffsUrl;
      try {
        const res = await fetch(url, { cache: 'no-store' });
        if (!res.ok) throw new Error(`HTTP ${res.status}`);
        const diffs = await res.json();
        const t = diffs.totals || {};
        const visuallyDifferentPages = (diffs.pages || [])
          .filter(p => p.status === 'different' || p.status === 'new')
          .map(p => p.path);

        const cards = [
          { label: 'Visually different', value: t.visuallyDifferent ?? 0, cls: 'stat-different' },
          { label: 'Potentially affected', value: t.potentiallyAffected ?? 0, cls: 'stat-affected' },
          { label: 'New', value: t.new ?? 0, cls: '' },
          { label: 'Identical', value: t.identical ?? 0, cls: 'stat-identical' },
        ];

        const grid = cards.map(c => `
          <div class="stat-card ${c.cls}">
            <p class="stat-label">${c.label}</p>
            <p class="stat-value">${c.value}</p>
          </div>`).join('');

        const pagesLine = visuallyDifferentPages.length
          ? `<p class="stat-pages">${visuallyDifferentPages.map(escapeHtml).join(' · ')}</p>`
          : '';

        node.innerHTML = `<div class="stat-grid">${grid}</div>${pagesLine}`;
      } catch {
        // Don't make the dashboard scary just because the JSON 404s — older
        // PRs won't have one. Fall back to a quiet placeholder.
        node.innerHTML = `<p class="stat-pages-loading">Visual-diff stats not available for this run.</p>`;
      }
    }

    function toggleReject(btn) {
      const card = btn.closest('.review-card');
      const form = card.querySelector('.reject-form');
      form.style.display = form.style.display === 'none' || !form.style.display
        ? 'block' : 'none';
    }

    async function approveRun(runId, envId) {
      try {
        const res = await ghFetch(
          `/repos/${REPO_OWNER}/${REPO_NAME}/actions/runs/${runId}/pending_deployments`,
          {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({
              environment_ids: [envId],
              state: 'approved',
              comment: 'Approved via admin review dashboard',
            }),
          }
        );
        if (res.ok) {
          showToast('Regression approved');
          await loadReviews();
        } else {
          const data = await res.json();
          showToast(`Failed: ${data.message || res.status}`, 5000);
        }
      } catch (err) {
        showToast(`Error: ${err.message}`, 5000);
      }
    }

    async function rejectRun(runId, envId, btn) {
      const card = btn.closest('.review-card');
      const comment = card.querySelector('.reject-form textarea').value.trim()
        || 'Changes requested via admin review dashboard';
      try {
        const res = await ghFetch(
          `/repos/${REPO_OWNER}/${REPO_NAME}/actions/runs/${runId}/pending_deployments`,
          {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({
              environment_ids: [envId],
              state: 'rejected',
              comment,
            }),
          }
        );
        if (res.ok) {
          showToast('Changes requested');
          await loadReviews();
        } else {
          const data = await res.json();
          showToast(`Failed: ${data.message || res.status}`, 5000);
        }
      } catch (err) {
        showToast(`Error: ${err.message}`, 5000);
      }
    }

    function escapeHtml(str) {
      const d = document.createElement('div');
      d.textContent = str;
      return d.innerHTML;
    }

    init();
  </script>
</body>
</html>
