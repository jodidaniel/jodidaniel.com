# ============================================================
# Decap CMS Configuration
# ============================================================

backend:
  name: github
  repo: {{CMS_REPO}}
  branch: main
  # OAuth proxy endpoint
  base_url: {{CMS_OAUTH_BASE_URL}}
  auth_endpoint: prod/auth
  # Decap's deploy-preview-links: the github backend reads
  # GET /commits/<pr-head-sha>/status and surfaces the first status
  # whose `context` equals this. .github/workflows/deploy-preview.yml's
  # "Set Decap deploy-preview commit status" step publishes exactly
  # `deploy/preview` once the per-PR preview is live. Without this the
  # editor's button is stuck on "Check for Preview" forever (decap-cms
  # 3.12.2: unset → loose "context includes 'deploy'" match; pinning it
  # is the explicit, auditable half of the contract — see the static
  # lock in e2e/cms-posts-list-enhance.spec.js). patch-preview-config.sh
  # only rewrites site_url/display_url/branch, so this survives the
  # per-PR preview rebuild unchanged.
  preview_context: deploy/preview

# Editorial workflow: every Save opens a PR on its own branch instead of
# committing straight to main. The PR drives the draft → review → ready →
# publish pipeline (cms/draft / cms/ready labels in cms-editorial-workflow.yml,
# the per-PR preview-pr{N}.adamdaniel.ai environment, and the visual
# regression review at /admin/reviews/). Without this, Save deploys to
# production immediately and bypasses the entire review gate.
publish_mode: editorial_workflow

# Site configuration
site_url: {{CMS_SITE_URL}}
display_url: {{CMS_DISPLAY_URL}}
logo_url: {{CMS_LOGO_URL}}

# Media library
#
# media_folder and public_folder MUST stay structurally identical
# (public_folder == "/" + media_folder). Decap appends only the
# uploaded file's basename to public_folder — it does NOT mirror any
# media_folder subdirectory into the URL. A flat, template-free path
# is the only configuration where the on-disk file and the URL written
# into content resolve to the same place on every backend (GitHub,
# decap-server, test-repo) and from every entrypoint (an entry's image
# field AND the standalone Media library, which has no entry/date
# context to expand `{{year}}`/`{{month}}` against). Date-bucketing
# the path reintroduces the broken-image / literal-`{{year}}`
# "Copy Path" bug. e2e/cms-config.spec.js enforces this invariant.
media_folder: "assets/images/uploads"
public_folder: /assets/images/uploads

# ============================================================
# Collections
# ============================================================
collections:

  # ── Posts ─────────────────────────────────────────────────
  #
  # Decap's `slug:` template runs first and produces the YYYY-MM-DD-
  # prefixed filename Jekyll's `_posts/` collection requires.
  # `{{slug}}` in `preview_path` then expands to that file slug, NOT to
  # the post's URL slug — diverging from `permalink: /blog/:slug/` in
  # _config.yml which strips the date prefix. The static templates
  # therefore can't round-trip on their own.
  #
  # The static template divergence is now moot because
  # `admin/native-preview-href.js` CSS-hides Decap's native "View Live"
  # anchor (it was redundant with the floating Live Preview button +
  # the deploy-status / commit pills, and it clipped the publish-status
  # pill off-screen on narrow viewports). The override stays in the DOM
  # tree React reconciles against — `removeChild` provoked React to
  # re-mount the anchor on every render, deadlocking publish-loop e2e
  # runs on commit 503365a. The `preview_path` value below is kept as
  # a hint for any internal Decap logic that touches it (and as
  # documentation of intent), but nothing user-facing reads it anymore.
  #
  # Don't try to fix this with a static template change. `slug: ''` in
  # the seed posts means a naive `{{fields.slug}}` swap expands to
  # `/blog//`. The override has to live in JS to mirror the same
  # explicit-slug-then-slugified-title chain the banner already does.
  # See e2e/cms-permalink-contract.spec.js for the contract.
  #
  - name: posts
    label: Posts
    label_singular: Post
    folder: _posts
    create: true
    delete: true
    # Decap auto-derives `{{slug}}` from the `slug` field if present, falling
    # back to `title`. The YYYY-MM-DD prefix is required by Jekyll's `_posts/`
    # collection. The native "View Live" toolbar anchor is CSS-hidden at
    # runtime by admin/native-preview-href.js so the date-prefix divergence
    # between this template and Jekyll's `permalink: /blog/:slug/` is moot.
    slug: "{{year}}-{{month}}-{{day}}-{{slug}}"
    preview_path: "/blog/{{slug}}/"
    # Date is rendered with the parsed-date tokens {{year}}-{{month}}-{{day}}
    # rather than `{{date | date('MMM D, YYYY')}}`. Decap's `date(...)`
    # summary filter runs bundled dayjs on the RAW stored string
    # ("YYYY-MM-DD HH:mm:ss ZZ", e.g. `2026-05-13 08:51:00 -0400`); that
    # space+offset form is not ISO-8601, so dayjs falls back to native
    # `new Date()`, which is Invalid on strict engines (WebKit / Safari /
    # iOS) — every post then rendered "INVALID DATE" there (issue #1042).
    # {{year}}/{{month}}/{{day}} use the SAME parsed-date machinery as the
    # `slug:` template above (which already produces correct YYYY-MM-DD
    # filenames on every engine — locked by cms-permalink-contract.spec.js),
    # so they are cross-engine safe. The richer per-row date + columns are
    # rendered by admin/posts-list-enhance.js; this is the no-JS fallback.
    summary: "{{title}} ({{year}}-{{month}}-{{day}}){{published | ternary('', ' — DRAFT')}}{{publish_date | ternary(' — Scheduled', '')}}"
    sortable_fields:
      - date
      - title
    # `Automated tests` matches posts carrying `test_fixture: true` (the
    # E2E canary fixtures). Decap 3.12.2 has no declarative default-on/off
    # for view_filters, so admin/posts-list-enhance.js hides fixture rows
    # by DEFAULT (issue #1042: "default to not checked, pre-existing
    # options checked") and renders a toggle to reveal them.
    view_filters:
      - label: Published
        field: published
        pattern: true
      - label: Drafts
        field: published
        pattern: false
      - label: Automated tests
        field: test_fixture
        pattern: true
    fields:
      - name: title
        label: Title
        widget: string
        required: true
        hint: "The post headline — make it compelling"

      - name: slug
        label: URL Slug
        widget: string
        required: false
        hint: "URL path segment (leave blank to auto-generate from title). Must match any existing published URL to avoid breaking inbound links."

      - name: date
        label: Date
        widget: datetime
        required: true
        date_format: "YYYY-MM-DD"
        time_format: "HH:mm"
        format: "YYYY-MM-DD HH:mm:ss ZZ"
        default: "{{now}}"

      - name: excerpt
        label: Excerpt
        widget: text
        required: false
        hint: "A short summary shown in post listings and meta tags (≤ 160 chars recommended)"

      - name: tags
        label: Tags
        widget: list
        required: false
        hint: "Type a tag and press Enter. New tags get an auto-generated archive page (the auto_tag_pages plugin) — no need to create them up front. Add a matching entry in the Tags collection if you want to give the tag a description."

      - name: featured_image
        label: Featured Image
        widget: image
        required: false
        hint: "Displayed as the post hero image and in social sharing cards"
        media_library:
          config:
            multiple: false

      - name: published
        label: Published
        widget: boolean
        default: false
        hint: "ON = goes live on the next deploy. Leave OFF to schedule a future publish via the Publish Date below — the scheduled-posts workflow flips this toggle on when the date arrives."

      - name: publish_date
        label: Publish Date
        widget: datetime
        required: false
        date_format: "YYYY-MM-DD"
        time_format: "HH:mm"
        format: "YYYY-MM-DD HH:mm:ss ZZ"
        hint: "Optional. Future date/time (UTC) to auto-publish this post. Only honoured when Published above is OFF — if Published is ON, the post goes live immediately and this field is ignored."

      # Hidden, non-editor-facing marker for E2E canary / automated-test
      # fixtures (issue #1042). `widget: hidden` keeps it out of the edit
      # form; `default: false` so real posts created in the editor are
      # never marked. The `Automated tests` view_filter keys off this,
      # and admin/posts-list-enhance.js hides flagged rows by default.
      # Set `test_fixture: true` only on the _posts canary fixtures.
      - name: test_fixture
        label: Automated test fixture
        widget: hidden
        default: false

      - name: body
        label: Body
        widget: markdown
        required: true
        hint: "Full post content. Supports Markdown, images, code blocks, and HTML embeds (toolbar → 'HTML Embed' button — drops a block of raw HTML / JS / CSS that round-trips between rich-text and raw modes). For a real-layout preview that updates on every Save, open /preview/?collection=posts in a second browser tab and snap it next to the editor."
        modes:
          - rich_text
          - raw

  # ── Tags ──────────────────────────────────────────────────
  - name: tags
    label: Tags
    label_singular: Tag
    folder: _tags
    create: true
    delete: true
    slug: "{{slug}}"
    identifier_field: name
    summary: "{{name}}"
    fields:
      - name: name
        label: Name
        widget: string
        required: true
        hint: "Tag label shown on posts (e.g. 'Machine Learning', 'Python')"

      - name: description
        label: Description
        widget: text
        required: false
        hint: "Optional short description shown on the tag archive page"

  # ── Projects ──────────────────────────────────────────────
  - name: projects
    label: Projects
    label_singular: Project
    folder: _projects
    create: true
    delete: true
    slug: "{{slug}}"
    preview_path: /projects/{{slug}}/
    summary: "{{title}}{{featured | ternary(' ⭐', '')}}"
    sortable_fields:
      - title
    view_filters:
      - label: Featured
        field: featured
        pattern: true
    fields:
      - name: title
        label: Title
        widget: string
        required: true

      - name: technology
        label: Technology / Stack
        widget: string
        required: false
        hint: "e.g. 'Python · LangChain · FastAPI' — shown as the accent label"

      - name: url_link
        label: Project URL
        widget: string
        required: false
        hint: "Live URL or GitHub repo link"
        pattern:
          - "^(https?://.*)?$"
          - "Must be a valid URL starting with http:// or https://"

      - name: featured
        label: Featured
        widget: boolean
        default: false
        hint: "Featured projects appear on the homepage"

      - name: images
        label: Images
        widget: list
        required: false
        hint: "Upload screenshots or demo images"
        field:
          name: image
          label: Image
          widget: image

      - name: description
        label: Description
        widget: markdown
        required: false
        hint: "Full project description — supports Markdown"
        modes:
          - rich_text
          - raw

  # ── Pages (file collection) ────────────────────────────────
  - name: pages
    label: Pages
    label_singular: Page
    folder: pages
    create: true
    delete: true
    slug: "{{slug}}"
    preview_path: "/pages/{{slug}}/"
    summary: "{{title}}"
    sortable_fields:
      - title
    fields:
      - name: title
        label: Title
        widget: string
        required: true
        hint: "The page heading — also used as the browser tab title"

      - name: layout
        label: Layout
        widget: hidden
        default: page

      - name: permalink
        label: Permalink
        widget: string
        required: true
        default: "/pages/"
        hint: "The URL path the page lives at. Convention is /pages/<slug>/, but you can use any path. Must start and end with a slash."
        pattern:
          - "^/.*/$"
          - "Must start and end with a slash, e.g. /pages/about/"

      - name: published
        label: Published
        widget: boolean
        default: false
        hint: "ON = page goes live on the next deploy. Leave OFF to keep it as a draft."

      - name: body
        label: Content
        widget: markdown
        required: true
        hint: "Page content. For a real-layout preview that updates on every Save, open /preview/?collection=pages in a second tab."
        modes:
          - rich_text
          - raw

  # ── E2E canaries (system collection) ──────────────────────
  #
  # The publish-loop end-to-end tests (e2e/cms-publish-loop*.spec.js)
  # drive admin actions against these stable, unadvertised entries
  # and assert the result on the public site. Between test runs the
  # body is reset to a known baseline, so the URLs always render
  # innocuous content.
  #
  # Both `create: true` and `delete: true` so the UI-driven test
  # specs can exercise the full CRUD lifecycle without back doors:
  #
  #   - `create: true` lets `cms-delete-published.spec.js` open
  #     the e2e collection and click "+ New E2E Canary" to seed
  #     its throw-away `canary-delete-<runId>.md` fixture via the
  #     Decap UI, replacing the `seedFixtureViaPr` back door that
  #     bypassed the editor.
  #   - `delete: true` is REQUIRED by the same spec, which clicks
  #     the Decap UI's "Delete published entry" menuitem on the
  #     throw-away fixture. Decap's delete UI uses the git data API
  #     directly (POST /git/trees → POST /git/commits → PATCH
  #     /git/refs/heads/main); auto-merge engages on the resulting
  #     `cms/<col>/<slug>` PR exactly like Save does. Until
  #     2026-05-07 this was `delete: false`, which made the menu
  #     render empty (run #25491225206: 30 s click timeout, 30 min
  #     spec timeout).
  #
  # Discoverability of accidental editor mutation is mitigated by
  # the explicit collection label and the `description` field
  # below. The label leads with [E2E TEST FIXTURES — DO NOT EDIT]
  # and the description spells out that the harness resets these
  # between runs.
  - name: e2e
    label: "[E2E TEST FIXTURES — DO NOT EDIT]"
    label_singular: "E2E Canary"
    description: >-
      System collection used by automated end-to-end tests. Editing these
      entries by hand is not supported — the test harness resets them
      between runs.
    folder: _e2e
    create: true
    delete: true
    slug: "{{slug}}"
    preview_path: "/e2e/{{slug}}/"
    summary: "{{title}}"
    sortable_fields:
      - title
    fields:
      - name: title
        label: Title
        widget: string
        required: true
      - name: layout
        label: Layout
        widget: hidden
        default: canary
      - name: permalink
        label: Permalink
        widget: hidden
      - name: canary_baseline
        label: Canary Baseline
        widget: hidden
      - name: canary_id
        label: Canary ID
        widget: hidden
      - name: collection_label
        label: Collection Label
        widget: hidden
      - name: slug
        label: Slug
        widget: hidden
      - name: date
        label: Date
        widget: datetime
        required: false
        date_format: "YYYY-MM-DD"
        time_format: "HH:mm"
        format: "YYYY-MM-DD HH:mm:ss ZZ"
      - name: technology
        label: Technology
        widget: string
        required: false
      - name: sitemap
        label: Include in Sitemap
        widget: hidden
        default: false
      - name: robots
        label: Robots
        widget: hidden
        default: "noindex,nofollow"
      # `widget: text` (plain textarea), NOT `widget: markdown`. The
      # markdown widget round-trips through Slate; soft line wraps inside
      # a paragraph come back doubled as paragraph breaks, and paragraph
      # breaks triple. The `cms-publish-loop.spec.js` step-9a UI cleanup
      # types the canonical baseline body through this field and then
      # publishes — with the markdown widget, the published file
      # disagrees with the typed text, producing perpetually open
      # `cms/e2e/canary-*` PRs that conflict with main once the
      # next run's safety-net pushes a clean baseline (see PR #882).
      # `e2e/canary-content.test.js` locks this in.
      - name: body
        label: Body
        widget: text
        required: true

  # __SITE_COLLECTIONS__  (render injects admin/collections.site.yml here, if present)
