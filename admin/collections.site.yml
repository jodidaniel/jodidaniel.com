  # ─────────────────────────────────────────────────────────────────────────────────
  # FOLDER COLLECTIONS: repeating items with automatic ordering via `weight` field.
  # ─────────────────────────────────────────────────────────────────────────────────

  - name: expertise
    label: "Expertise"
    folder: "_expertise"
    create: true
    slug: "{{weight}}-{{slug}}"
    editor:
      preview: false
    fields:
      - { name: title,       label: "Title", widget: string }
      - { name: description, label: "Description", widget: text }
      - { name: weight,      label: "Order", widget: number, hint: "1–6; controls sort order" }

  - name: experience
    label: "Experience"
    folder: "_experience"
    create: true
    slug: "{{weight}}-{{slug}}"
    editor:
      preview: false
    fields:
      - { name: title,       label: "Role", widget: string }
      - { name: org,         label: "Organization", widget: string }
      - { name: period,      label: "Period", widget: string }
      - { name: description, label: "Description", widget: text }
      - { name: weight,      label: "Order", widget: number, hint: "1–5; controls sort order" }

  - name: accomplishments
    label: "Accomplishments"
    folder: "_accomplishments"
    create: true
    slug: "{{weight}}-{{slug}}"
    editor:
      preview: false
    fields:
      - { name: title, label: "Label (bold lead-in)", widget: string }
      - { name: text,  label: "Text", widget: text }
      - { name: weight, label: "Order", widget: number, hint: "1–7; controls sort order" }

  - name: media
    label: "Media Items"
    folder: "_media"
    create: true
    slug: "{{weight}}-{{slug}}"
    editor:
      preview: false
    fields:
      - { name: category, label: "Category", widget: select, options: ["Featured Articles", "Policy & Advocacy", "Podcasts & Interviews", "Speaking & Panels", "Press & News"] }
      - { name: title,    label: "Title", widget: string }
      - { name: source,   label: "Source", widget: string }
      - { name: url,      label: "URL", widget: string, pattern: ["^https?://.*", "Must be a valid http(s) URL"] }
      - { name: weight,   label: "Order within category", widget: number }

  - name: education
    label: "Education"
    folder: "_education"
    create: true
    slug: "{{weight}}-{{slug}}"
    editor:
      preview: false
    fields:
      - { name: degree,  label: "Degree", widget: string }
      - { name: field,   label: "Field", widget: string }
      - { name: school,  label: "School", widget: string }
      - { name: weight,  label: "Order", widget: number, hint: "1–3; controls sort order" }

  # ─────────────────────────────────────────────────────────────────────────────────
  # FILE COLLECTIONS: singleton sections (one entry each).
  # ─────────────────────────────────────────────────────────────────────────────────

  - name: site_header
    label: "Header / Hero"
    delete: false
    editor:
      preview: false
    files:
      - name: header
        label: "Header (Name & Tagline)"
        file: "_data/header.yml"
        fields:
          - { name: name,    label: "Name", widget: string }
          - { name: tagline, label: "Tagline", widget: string }

  - name: site_about
    label: "About"
    delete: false
    editor:
      preview: false
    files:
      - name: about
        label: "About Section"
        file: "_data/about.yml"
        fields:
          - { name: photo,         label: "Profile Photo", widget: image, required: false, media_library: { config: { multiple: false } } }
          - { name: intro_heading, label: "Intro Heading", widget: string }
          - { name: bio,           label: "Bio Paragraphs", widget: list, summary: "{{fields.paragraph | truncate(60)}}", field: { name: paragraph, label: "Paragraph", widget: text } }
          - name: nav
            label: "In-Page Nav Links"
            widget: list
            summary: "{{fields.label}}"
            fields:
              - { name: label,  label: "Label", widget: string }
              - { name: anchor, label: "Anchor (section id, no #)", widget: string }

  - name: site_contact
    label: "Contact"
    delete: false
    editor:
      preview: false
    files:
      - name: contact
        label: "Contact Section"
        file: "_data/contact.yml"
        fields:
          - { name: heading, label: "Heading", widget: string }
          - { name: intro,   label: "Intro", widget: text }
          - name: links
            label: "Contact Links"
            widget: list
            summary: "{{fields.label}}"
            fields:
              - { name: label, label: "Label", widget: string }
              - { name: url,   label: "URL", widget: string, pattern: ["^(https?:|mailto:).*", "http(s) or mailto URL"] }
              - { name: icon,  label: "Icon", widget: select, options: [globe, linkedin, email], default: globe }

  - name: site_settings
    label: "Site Settings"
    delete: false
    editor:
      preview: false
    files:
      - name: settings
        label: "Settings & Gating"
        file: "_data/settings.yml"
        fields:
          - { name: site_live, label: "Site Live (controls gating)", widget: boolean, hint: "When false, only shows 'coming soon'; when true, shows full bio." }
          - name: coming_soon
            label: "Coming Soon (shown when site_live = false)"
            widget: object
            fields:
              - { name: tagline,   label: "Coming Soon Tagline", widget: string }
              - { name: copyright, label: "Copyright", widget: string }
          - name: footer
            label: "Footer (shown when site_live = true)"
            widget: object
            fields:
              - { name: copyright, label: "Copyright", widget: string }
          - name: section_headings
            label: "Section Headings"
            widget: object
            fields:
              - { name: expertise_heading,       label: "Expertise Heading", widget: string }
              - { name: experience_heading,      label: "Experience Heading", widget: string }
              - { name: accomplishments_heading, label: "Accomplishments Heading", widget: string }
              - { name: media_heading,           label: "Media Heading", widget: string }
              - { name: education_heading,       label: "Education Heading", widget: string }
