# ============================================================
# Decap CMS — LOCAL DEVELOPMENT CONFIG
# Uses decap-server proxy — no GitHub OAuth needed
# Run:  npx decap-server   (from repo root, port 8081)
# ============================================================

local_backend: true

backend:
  name: github
  repo: {{CMS_REPO}}
  branch: main
  # Mirrors admin/config.yml — Decap's github-backend deploy-preview
  # detection matches a `deploy/preview` commit status. Inert under
  # local_backend (decap-server is simple-mode, no editorial workflow),
  # kept so the three configs stay in lockstep and one static spec can
  # assert the contract everywhere.
  preview_context: deploy/preview

site_url: http://localhost:4000
display_url: http://localhost:4000

# Cobalt-thermal theme is linked from admin/index-local.html (Decap has no
# `custom_css` config option).

# Flat, template-free path — must mirror admin/config.yml exactly
# (public_folder == "/" + media_folder). See that file for why.
media_folder: "assets/images/uploads"
public_folder: /assets/images/uploads

collections:

  # ── Posts ─────────────────────────────────────────────────
  # The `slug:` date prefix is required by Jekyll's `_posts/` folder; the
  # divergence it introduces against `permalink: /blog/:slug/` is moot
  # at runtime because admin/native-preview-href.js CSS-hides the native
  # "View Live" toolbar anchor. See admin/config.yml's Posts
  # block for the long-form rationale.
  - name: posts
    label: Posts
    label_singular: Post
    folder: _posts
    create: true
    delete: true
    slug: "{{year}}-{{month}}-{{day}}-{{slug}}"
    preview_path: "/blog/{{slug}}/"
    # See admin/config.yml for the {{year}}-{{month}}-{{day}} rationale
    # (the dayjs `date(...)` filter renders "INVALID DATE" on WebKit for
    # the stored space+offset date format — issue #1042). Kept in
    # lockstep; cms-post-list-summary.spec.js asserts this line verbatim
    # across all three configs.
    summary: "{{title}} ({{year}}-{{month}}-{{day}}){{published | ternary('', ' — DRAFT')}}{{publish_date | ternary(' — Scheduled', '')}}"
    sortable_fields:
      - date
      - title
    view_filters:
      - label: Published
        field: published
        pattern: true
      - label: Drafts
        field: published
        pattern: false
      - label: Automated tests
        field: test_fixture
        pattern: true
    fields:
      - name: title
        label: Title
        widget: string
        required: true
      - name: slug
        label: URL Slug
        widget: string
        required: false
        hint: "URL path segment (leave blank to auto-generate from title). Must match any existing published URL to avoid breaking inbound links."
      - name: date
        label: Date
        widget: datetime
        required: true
        date_format: "YYYY-MM-DD"
        time_format: "HH:mm"
        format: "YYYY-MM-DD HH:mm:ss ZZ"
        default: "{{now}}"
      - name: excerpt
        label: Excerpt
        widget: text
        required: false
      - name: tags
        label: Tags
        widget: list
        required: false
        hint: "Type a tag and press Enter. New tags get an auto-generated archive page (the auto_tag_pages plugin) — no need to create them up front. Add a matching entry in the Tags collection if you want to give the tag a description."
      - name: featured_image
        label: Featured Image
        widget: image
        required: false
      - name: published
        label: Published
        widget: boolean
        default: false
        hint: "ON = goes live on the next deploy. Leave OFF to schedule a future publish via the Publish Date below — the scheduled-posts workflow flips this toggle on when the date arrives."
      - name: publish_date
        label: Publish Date
        widget: datetime
        required: false
        date_format: "YYYY-MM-DD"
        time_format: "HH:mm"
        format: "YYYY-MM-DD HH:mm:ss ZZ"
        hint: "Optional. Future date/time (UTC) to auto-publish this post. Only honoured when Published above is OFF — if Published is ON, the post goes live immediately and this field is ignored."
      # Hidden marker for E2E/automated-test fixtures — see admin/config.yml.
      - name: test_fixture
        label: Automated test fixture
        widget: hidden
        default: false
      - name: body
        label: Body
        widget: markdown
        required: true
        hint: "Full post content. For a real-layout preview that updates on every Save, open /preview/?collection=posts in a second tab."
        modes:
          - rich_text
          - raw

  - name: tags
    label: Tags
    label_singular: Tag
    folder: _tags
    create: true
    delete: true
    slug: "{{slug}}"
    identifier_field: name
    summary: "{{name}}"
    fields:
      - name: name
        label: Name
        widget: string
        required: true
      - name: description
        label: Description
        widget: text
        required: false

  - name: projects
    label: Projects
    label_singular: Project
    folder: _projects
    create: true
    delete: true
    slug: "{{slug}}"
    preview_path: /projects/{{slug}}/
    summary: "{{title}}{{featured | ternary(' ⭐', '')}}"
    fields:
      - name: title
        label: Title
        widget: string
        required: true
      - name: technology
        label: Technology / Stack
        widget: string
        required: false
      - name: url_link
        label: Project URL
        widget: string
        required: false
      - name: featured
        label: Featured
        widget: boolean
        default: false
      - name: images
        label: Images
        widget: list
        required: false
        field:
          name: image
          label: Image
          widget: image
      - name: description
        label: Description
        widget: markdown
        required: false
        modes:
          - rich_text
          - raw

  - name: pages
    label: Pages
    label_singular: Page
    folder: pages
    create: true
    delete: true
    slug: "{{slug}}"
    preview_path: "/pages/{{slug}}/"
    summary: "{{title}}"
    sortable_fields:
      - title
    fields:
      - name: title
        label: Title
        widget: string
        required: true
      - name: layout
        label: Layout
        widget: hidden
        default: page
      - name: permalink
        label: Permalink
        widget: string
        required: true
        default: "/pages/"
        pattern:
          - "^/.*/$"
          - "Must start and end with a slash"
      - name: published
        label: Published
        widget: boolean
        default: false
      - name: body
        label: Content
        widget: markdown
        required: true
        modes:
          - rich_text
          - raw
