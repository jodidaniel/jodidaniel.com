<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Decap CMS Diagnostic — Adam Daniel</title>
  <!--
    Self-verifying admin entrypoint.

    Decap's in-browser test-repo backend with publish_mode:
    editorial_workflow. No GitHub OAuth required — pre-seeded
    entries land in window.repoFiles before Decap mounts, so opening
    an entry exercises the full editor render path (including the
    per-field isDisabled gate that the read-only bug report
    described).

    Doubles as the e2e harness driven by
    e2e/cms-editorial-workflow.spec.js (Playwright addInitScript
    overrides window.repoFiles before navigation).

    On load, the page mounts a status banner that reports:
      EDITABLE        — Title input enabled, no widget wrapper has
                        pointer-events: none / opacity < 0.6.
      FIELDS DISABLED — at least one widget renders with the disabled
                        style Decap injects via EditorControl.js's
                        styleStrings.disabled.

    Anyone with this URL can verify the rendering path without a
    debugger. If the live admin's GitHub-backend path shows the
    read-only bug but this URL says EDITABLE, the issue is in the
    GitHub-backend code path — not the form renderer.
  -->
  <style>
    #cms-diagnostic {
      position: fixed;
      bottom: 0; left: 0; right: 0;
      z-index: 100000;
      padding: 0.6rem 1rem;
      font-family: ui-monospace, SFMono-Regular, Menlo, monospace;
      font-size: 0.78rem;
      letter-spacing: 0.04em;
      color: #24292f;
      background: #f6f8fa;
      border-top: 1px solid #d0d7de;
      display: flex; align-items: center; gap: 1rem;
    }
    #cms-diagnostic .badge {
      padding: 0.2rem 0.55rem;
      border-radius: 3px;
      font-weight: 600;
      letter-spacing: 0.1em;
      text-transform: uppercase;
    }
    #cms-diagnostic .badge.pending { background: #d0d7de; color: #24292f; }
    #cms-diagnostic .badge.green   { background: #1a7f37; color: #ffffff; }
    #cms-diagnostic .badge.red     { background: #cf222e; color: #ffffff; }
    #cms-diagnostic .detail        { color: #57606a; flex: 1; }
    #cms-diagnostic a { color: #0969da; text-decoration: underline; }
    /* Pad the bottom of Decap's app shell so the banner doesn't
     * occlude in-page content. The banner is bottom-pinned (NOT
     * top-pinned) because Decap's editor toolbar is itself
     * `position: fixed; top: 0` — a top-pinned banner intercepts
     * pointer events on Save / Status / Delete and the editor
     * stops working. */
    #nc-root, [class*="AppWrapper"] { padding-bottom: 44px !important; }
  </style>
  <!-- Responsive layer for the Decap shell (iPhone 16 + small screens).
       Single source of truth shared by all three admin shells; replaces
       the old inline narrow-viewport sidebar rule. See admin-mobile.css. -->
  <link rel="stylesheet" href="admin-mobile.css" />
</head>
<body>
  <!-- Diagnostic banner; updated at runtime once Decap mounts -->
  <div id="cms-diagnostic">
    <span class="badge pending" id="cms-diagnostic-status">PENDING</span>
    <span class="detail" id="cms-diagnostic-detail">
      Loading Decap (test-repo backend + editorial workflow). Click
      <strong>Login</strong>, then open
      <a href="#/collections/posts/entries/2026-04-25-replacement-test-post-1">Replacement test post 1</a>
      to verify the editor render.
    </span>
  </div>

  <link rel="cms-config-url" type="text/yaml" href="config-test.yml">

  <!--
    Pre-seed window.repoFiles BEFORE the Decap bundle loads. Mirrors
    the front-matter shape of the production post the bug was reported
    against — empty-string slug / excerpt / featured_image / publish_date,
    null reading_time. If any of those values trips a widget into a
    disabled state, the diagnostic check below catches it.

    Playwright's addInitScript() runs before this <script>, so the
    e2e spec can override window.repoFiles for its own seed; the
    interactive default below is what a human visiting the URL sees.
  -->
  <script>
    if (!window.repoFiles) {
      window.repoFiles = {
        _posts: {
          "2026-04-25-replacement-test-post-1.md": {
            content: [
              "---",
              "title: Replacement test post 1",
              "slug: ''",
              "date: 2026-04-25 16:33:00 -0400",
              "excerpt: ''",
              "tags: []",
              "featured_image: ''",
              "published: true",
              "publish_date: ''",
              "reading_time: null",
              "---",
              "",
              "Wow, a post",
              ""
            ].join("\n")
          }
        },
        _tags: {},
        _projects: {},
        pages: {}
      };
    }
    if (!window.repoFilesUnpublished) window.repoFilesUnpublished = [];
  </script>

  <script src="https://unpkg.com/decap-cms@3.12.2/dist/decap-cms.js"></script>

  <!-- "HTML Embed" editor component — see admin/index.html for rationale. -->
  <script src="editor-component-html-embed.js" defer></script>

  <!-- Single source of truth for the live URL — see admin/index.html.
       Required so the native preview-href override below produces the
       same URL as the banner. -->
  <script src="live-url-derive.js" defer></script>

  <!-- "View page on site:" banner — see admin/index.html for rationale.
       Loads after live-url-derive.js, before native-preview-href.js. -->
  <script src="live-url-banner.js" defer></script>

  <!-- Native "View Live" toolbar override — see admin/index.html. -->
  <script src="native-preview-href.js" defer></script>

  <!-- Posts list dashboard — see admin/index.html (#1042). -->
  <script src="posts-list-enhance.js" defer></script>

  <!--
    Status banner updater. Once the user navigates to the seeded
    Posts entry, walk every Decap widget wrapper and inspect its
    computed pointer-events / opacity — the same CSS Decap injects
    via EditorControl.js's styleStrings.disabled. If anything reads
    as non-interactive, flip the badge to red and report which field.
  -->
  <script>
    (function () {
      var statusEl = document.getElementById("cms-diagnostic-status");
      var detailEl = document.getElementById("cms-diagnostic-detail");

      function setStatus(level, label, html) {
        statusEl.className = "badge " + level;
        statusEl.textContent = label;
        if (html) detailEl.innerHTML = html;
      }

      function inspect() {
        var hash = location.hash || "";
        if (!/#\/collections\/posts\/entries\//.test(hash)) {
          return; // not on an entry view yet — leave PENDING
        }
        var titleInput = document.querySelector(
          'input[type="text"][id*="title" i], input[type="text"][placeholder*="title" i]'
        );
        if (!titleInput) {
          var inputs = document.querySelectorAll(
            "input:not([type=hidden]), textarea, [role='textbox']"
          );
          if (!inputs.length) return; // editor not mounted yet
          titleInput = inputs[0];
        }

        var report = [];
        var bad = false;
        var wrappers = document.querySelectorAll('[class*="ControlContainer"]');
        wrappers.forEach(function (el) {
          var cs = getComputedStyle(el);
          var labelEl = el.querySelector("label, h3, h4, legend");
          var label = labelEl ? labelEl.textContent.trim() : "(unknown)";
          var pe = cs.pointerEvents;
          var op = parseFloat(cs.opacity);
          if (pe === "none" || op < 0.6) {
            bad = true;
            report.push(label + " (pointer-events:" + pe + ", opacity:" + op + ")");
          }
        });

        if (titleInput.disabled || titleInput.readOnly) {
          bad = true;
          report.push("Title input is disabled/readonly at the DOM level");
        }

        if (bad) {
          setStatus(
            "red",
            "FIELDS DISABLED",
            "<strong>Reproduces the read-only bug:</strong> " +
              report.join("; ") + ". " +
              "If this URL says EDITABLE on production but a real " +
              "<code>/admin/#/collections/...</code> URL shows fields disabled, " +
              "the bug is in the GitHub-backend code path (auth, workflow PR " +
              "fetch, etc.) — not the form renderer."
          );
        } else {
          setStatus(
            "green",
            "EDITABLE",
            wrappers.length + " widget wrappers OK; Title input enabled; " +
              "no widget renders with pointer-events:none or opacity &lt; 0.6. " +
              "The Decap render path is healthy."
          );
        }
      }

      var pending = false;
      function poll() {
        if (pending) return;
        pending = true;
        requestAnimationFrame(function () {
          pending = false;
          inspect();
        });
      }

      window.addEventListener("hashchange", poll);
      new MutationObserver(poll).observe(document.body, {
        childList: true, subtree: true
      });
    })();
  </script>
</body>
</html>
