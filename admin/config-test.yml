# ============================================================
# Decap CMS — TEST CONFIG
#
# Loaded by admin/index-test.html for Playwright e2e tests that
# need to exercise the EDITORIAL WORKFLOW + GitHub-style backend
# code path.
#
# `local_backend: true` (admin/config-local.yml) routes through
# decap-server, which forces simple-mode regardless of
# `publish_mode`. That means cms-smoke and cms-publish-flow can
# never reproduce a workflow-only bug. The `test-repo` backend
# is Decap's official in-browser backend (used by their own
# dev-test) — pure JS, supports editorial_workflow, seeded via
# `window.repoFiles` / `window.repoFilesUnpublished`.
#
# Tests pre-seed those globals via Playwright's addInitScript
# before Decap mounts, so each test starts from a known repo
# state.
# ============================================================

backend:
  name: test-repo
  # Mirrors admin/config.yml — inert for the in-browser test-repo
  # backend (its getDeployPreview is a stub), kept so the three configs
  # stay in lockstep and one static spec asserts the contract everywhere.
  preview_context: deploy/preview

site_url: http://localhost:4000
display_url: http://localhost:4000

publish_mode: editorial_workflow

# Flat, template-free path — must mirror admin/config.yml exactly
# (public_folder == "/" + media_folder). See that file for why.
media_folder: "assets/images/uploads"
public_folder: /assets/images/uploads

# Schema MUST stay in lockstep with admin/config.yml's collections —
# the e2e tests are catching production-shape regressions, so the
# fields, widgets, slug template, and required flags need to match
# exactly. The cms-config.spec.js invariants enforce a subset of
# this; the editorial-workflow spec exercises the rest at runtime.
collections:

  # ── Posts ─────────────────────────────────────────────────
  # The `slug:` date prefix is required by Jekyll's `_posts/` folder; the
  # divergence it introduces against `permalink: /blog/:slug/` is moot
  # at runtime because admin/native-preview-href.js CSS-hides the native
  # "View Live" toolbar anchor. See admin/config.yml's Posts
  # block for the long-form rationale.
  - name: posts
    label: Posts
    label_singular: Post
    folder: _posts
    create: true
    delete: true
    slug: "{{year}}-{{month}}-{{day}}-{{slug}}"
    preview_path: "/blog/{{slug}}/"
    # See admin/config.yml for the {{year}}-{{month}}-{{day}} rationale
    # (the dayjs `date(...)` filter renders "INVALID DATE" on WebKit for
    # the stored space+offset date format — issue #1042). Kept in
    # lockstep; cms-post-list-summary.spec.js asserts this line verbatim
    # across all three configs.
    summary: "{{title}} ({{year}}-{{month}}-{{day}}){{published | ternary('', ' — DRAFT')}}{{publish_date | ternary(' — Scheduled', '')}}"
    sortable_fields:
      - date
      - title
    view_filters:
      - label: Published
        field: published
        pattern: true
      - label: Drafts
        field: published
        pattern: false
      - label: Automated tests
        field: test_fixture
        pattern: true
    fields:
      - name: title
        label: Title
        widget: string
        required: true
      - name: slug
        label: URL Slug
        widget: string
        required: false
      - name: date
        label: Date
        widget: datetime
        required: true
        date_format: "YYYY-MM-DD"
        time_format: "HH:mm"
        format: "YYYY-MM-DD HH:mm:ss ZZ"
        default: "{{now}}"
      - name: excerpt
        label: Excerpt
        widget: text
        required: false
      - name: tags
        label: Tags
        widget: list
        required: false
      - name: featured_image
        label: Featured Image
        widget: image
        required: false
      - name: published
        label: Published
        widget: boolean
        default: false
        hint: "ON = goes live on the next deploy. Leave OFF to schedule a future publish via the Publish Date below."
      - name: publish_date
        label: Publish Date
        widget: datetime
        required: false
        date_format: "YYYY-MM-DD"
        time_format: "HH:mm"
        format: "YYYY-MM-DD HH:mm:ss ZZ"
      # Hidden marker for E2E/automated-test fixtures — see admin/config.yml.
      - name: test_fixture
        label: Automated test fixture
        widget: hidden
        default: false
      - name: body
        label: Body
        widget: markdown
        required: true
        hint: "Open /preview/?collection=posts in a second tab for the real-layout preview."
        modes:
          - rich_text
          - raw

  - name: tags
    label: Tags
    label_singular: Tag
    folder: _tags
    create: true
    delete: true
    slug: "{{slug}}"
    identifier_field: name
    summary: "{{name}}"
    fields:
      - name: name
        label: Name
        widget: string
        required: true
      - name: description
        label: Description
        widget: text
        required: false

  - name: projects
    label: Projects
    label_singular: Project
    folder: _projects
    create: true
    delete: true
    slug: "{{slug}}"
    preview_path: /projects/{{slug}}/
    summary: "{{title}}{{featured | ternary(' ⭐', '')}}"
    fields:
      - name: title
        label: Title
        widget: string
        required: true
      - name: technology
        label: Technology / Stack
        widget: string
        required: false
      - name: url_link
        label: Project URL
        widget: string
        required: false
      - name: featured
        label: Featured
        widget: boolean
        default: false
      - name: images
        label: Images
        widget: list
        required: false
        field:
          name: image
          label: Image
          widget: image
      - name: description
        label: Description
        widget: markdown
        required: false
        modes:
          - rich_text
          - raw

  - name: pages
    label: Pages
    label_singular: Page
    folder: pages
    create: true
    delete: true
    slug: "{{slug}}"
    preview_path: "/pages/{{slug}}/"
    summary: "{{title}}"
    sortable_fields:
      - title
    fields:
      - name: title
        label: Title
        widget: string
        required: true
      - name: layout
        label: Layout
        widget: hidden
        default: page
      - name: permalink
        label: Permalink
        widget: string
        required: true
        default: "/pages/"
        pattern:
          - "^/.*/$"
          - "Must start and end with a slash"
      - name: published
        label: Published
        widget: boolean
        default: false
      - name: body
        label: Content
        widget: markdown
        required: true
        modes:
          - rich_text
          - raw
