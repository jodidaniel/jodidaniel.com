    - { label: "Contact",         anchor: "contact" }
expertise_heading: "Areas of Expertise"
expertise:
  - title: "Digital Health & AI"
    description: "Artificial intelligence and machine learning applications in healthcare, including regulatory strategy and compliance frameworks."
  - title: "Health Data Privacy"
    description: "HIPAA compliance, health information exchange, and privacy frameworks for electronic health records and health data platforms."
  - title: "FDA & Regulatory Strategy"
    description: "Digital therapeutics, mobile health applications, and medical device software regulatory pathways and approvals."
  - title: "Telehealth & Remote Care"
    description: "Remote patient monitoring, telemedicine regulations, and virtual care delivery models across state and federal jurisdictions."
  - title: "Health IT Policy"
    description: "Interoperability standards, information blocking rules, and health IT certification requirements."
  - title: "Strategic Advisory"
    description: "Policy development, government relations, and strategic counsel for healthcare technology innovators and investors."
experience_heading: "Professional Experience"
experience:
  - role: "Partner"
    org: "Wilson Sonsini Goodrich & Rosati"
    period: "2025 - Present"
    description: "Partner in the Washington, D.C. office, serving as a key member of the Digital Health and Data, Privacy, and Cybersecurity practices."
  - role: "Partner & Managing Director"
    org: "Crowell & Moring LLP / Crowell Health Solutions"
    period: "2015 - 2025"
    description: "Led the Digital Health Practice, served on the Health Care Group steering committee, and co-founded Crowell Health Solutions strategic consulting firm."
  - role: "Founding Director, Office of Policy"
    org: "Office of the National Coordinator for Health IT (ONC), HHS"
    period: "2005 - 2015"
    description: "Led federal advisory committees and established national health IT policy on privacy, security, consumer e-health, telehealth, and safety oversight. Served under all five ONC leaders since the office was founded."
  - role: "Senior Counsel for Health IT"
    org: "Office of the General Counsel, HHS"
    period: "2000 - 2005"
    description: "First senior counsel for health IT at HHS. Founded and chaired the health IT practice group, developed legal strategies, and advised CMS on e-prescribing regulations."
  - role: "Attorney-Advisor"
    org: "Civil Rights Division, Office of the General Counsel, HHS"
    period: "Prior to 2000"
    description: "Began federal career as an attorney-advisor, gaining foundational experience in healthcare law and civil rights."
accomplishments_heading: "Key Accomplishments"
accomplishments:
  - label: "HIPAA Architect"
    text: "Key drafter of the original HIPAA Privacy Rules and Enforcement Rules that govern health data protection nationwide"
  - label: "Privacy Framework Developer"
    text: "Created the Nationwide Privacy and Security Framework for Electronic Exchange of Health Information"
  - label: "Health IT Standards Pioneer"
    text: "Helped develop early standards and certification rules for health information technology"
  - label: "Consumer Health Champion"
    text: "Launched ONC's Consumer e-Health and Health IT Safety programs"
  - label: "Information Blocking Expert"
    text: "Contributed to drafting ONC's landmark information blocking report and regulations"
  - label: "HITECH Act Implementation"
    text: "Helped chart health IT strategies before and after the HITECH Act invested billions in healthcare technology"
  - label: "Yale Faculty"
    text: "Serves as Adjunct Assistant Professor at Yale School of Medicine, educating the next generation of health leaders"
