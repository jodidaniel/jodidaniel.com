# Thin caller — copied into a site repo as
# `.github/workflows/cms-delete-published-preview.yml`. Owns the
# workflow_dispatch trigger + run-name; delegates the preview-env
# delete-published loop to the platform's reusable workflow.
name: CMS Delete Published — Preview Env
run-name: "${{ format('manual — PR #{0} @{1}', inputs.pr_number, github.actor) }}"

on:
  workflow_dispatch:
    inputs:
      pr_number:
        description: >-
          Parent PR number (the preview env to target). Must be open with
          deploy-preview having run successfully.
        required: true
        type: string

permissions:
  contents: read
  pull-requests: write

jobs:
  preview-delete:
    uses: Adam-S-Daniel/cms-platform/.github/workflows/cms-delete-published-preview.yml@v0.1.25
    with:
      pr_number: ${{ inputs.pr_number }}
      apex: jodidaniel.com
      platform_ref: v0.1.25
    secrets:
      CMS_E2E_PAT: ${{ secrets.CMS_E2E_PAT }}
