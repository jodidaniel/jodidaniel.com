name: Sweep stale CMS PRs
on:
  schedule:
    - cron: '0 4 * * *'
  workflow_dispatch:
    inputs:
      dry_run:
        description: 'List candidates without closing'
        type: boolean
        default: false
      threshold_hours:
        description: 'Min PR age in hours before sweeping'
        type: number
        default: 6
permissions:
  contents: write
  pull-requests: write
jobs:
  sweep:
    uses: Adam-S-Daniel/cms-platform/.github/workflows/sweep-stale-cms-prs.yml@v0.1.0
    with:
      dry_run: ${{ github.event_name == 'workflow_dispatch' && inputs.dry_run || false }}
      threshold_hours: ${{ github.event_name == 'workflow_dispatch' && inputs.threshold_hours || 6 }}
