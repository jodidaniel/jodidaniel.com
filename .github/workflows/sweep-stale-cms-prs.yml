name: Sweep stale CMS PRs
on:
  schedule:
    - cron: '0 4 * * *'
  workflow_dispatch:
    inputs:
      dry_run:
        description: 'List candidates without closing (true/false)'
        # Declared `string` and fromJSON-coerced below. workflow_dispatch
        # hands typed (boolean/number) inputs to a reusable's `with:` as
        # strings, and the reusable's boolean/number inputs reject them — the
        # dispatch run startup-fails before any job. The scheduled cron is
        # unaffected (the `&&` short-circuits, so fromJSON never runs there).
        type: string
        default: 'false'
      threshold_hours:
        description: 'Min PR age in hours before sweeping'
        type: string
        default: '6'
permissions:
  contents: write
  pull-requests: write
jobs:
  sweep:
    # The sweep reusable authenticates `gh` from CMS_E2E_PAT, which it
    # declares as a workflow_call secret (from v0.1.3) — map it explicitly
    # like every other caller. Keep `@<tag>` in step with the platform release.
    uses: Adam-S-Daniel/cms-platform/.github/workflows/sweep-stale-cms-prs.yml@v0.1.51
    secrets:
      CMS_E2E_PAT: ${{ secrets.CMS_E2E_PAT }}
    with:
      dry_run: ${{ github.event_name == 'workflow_dispatch' && fromJSON(inputs.dry_run) || false }}
      threshold_hours: ${{ github.event_name == 'workflow_dispatch' && fromJSON(inputs.threshold_hours) || 6 }}
