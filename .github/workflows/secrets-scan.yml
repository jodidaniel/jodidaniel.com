name: Secrets scan
on:
  pull_request:
    types: [opened, synchronize, reopened, edited]
    branches: [main]
  push:
    branches: [main]
  schedule:
    - cron: '0 7 * * 0'   # weekly full-history sweep
  workflow_dispatch:
permissions:
  contents: read
  pull-requests: read
jobs:
  # edited fires only for base retargets (changes.base present) — title/body edits stay no-ops (#145)
  scan:
    if: github.event.action != 'edited' || github.event.changes.base.ref.from != ''
    uses: Adam-S-Daniel/cms-platform/.github/workflows/secrets-scan.yml@v0.1.67
