# Thin caller — copied into a site repo as
# `.github/workflows/cms-publish-loop-host.yml`. Owns the schedule / push
# triggers + run-name; delegates the host-repo canary publish loop to the
# platform's reusable workflow. The e2e harness + the cms-recursion-gate /
# await-prod-deploy / post-failure-comment composites all live in the
# platform repo. Keep `platform_ref` equal to the `@vX.Y.Z` pin on the
# `uses:` line.
#
# Site identity (CMS_PROD_URL / CMS_APEX) is read from THIS repo's VARS by
# the reusable workflow.
name: CMS Publish Loop — Host Repo (canary collection)
run-name: >-
  ${{ github.event_name == 'schedule'
        && format('scheduled — {0}', github.event.schedule)
   || github.event_name == 'push'
        && format('push — {0} @{1}', github.ref_name, github.actor)
   || format('manual — @{0}', github.actor) }}

on:
  schedule:
    # 12:00 UTC daily. All real-prod loops serialize through the shared
    # `prod-mutating-loop` concurrency group declared on each loop's
    # heavy job, so mutual exclusion is structural, not time-based.
    - cron: '0 12 * * *'
  workflow_dispatch:
  push:
    branches: [main]
    # #70: disjoint push paths — only this caller + the canary surfaces;
    # prod OWNS the shared infra paths on push, host covers them via its
    # 12:00 cron. This site has NO canary surfaces to list: `_e2e/canary-*.md`
    # and `_layouts/canary.html`/`default.html` never exist here — this
    # single-page bio's `cms.base_collections: []` hides the `e2e` collection
    # from `/admin`, so the host-loop's own canary spec self-skips
    # (cms-platform's e2e/cms-publish-loop.spec.js `hasE2ECanaries` guard) and
    # never writes those files. The only real trigger is the caller file
    # itself; this loop otherwise runs solely off the 12:00 UTC cron.
    paths:
      - .github/workflows/cms-publish-loop-host.yml

permissions:
  contents: read
  pull-requests: write
  actions: read

jobs:
  host-loop:
    uses: Adam-S-Daniel/cms-platform/.github/workflows/cms-publish-loop-host.yml@v0.1.54
    with:
      # Pin to the SAME ref as the `uses:` pin above so the harness matches.
      platform_ref: v0.1.54
    secrets:
      CMS_E2E_PAT: ${{ secrets.CMS_E2E_PAT }}
