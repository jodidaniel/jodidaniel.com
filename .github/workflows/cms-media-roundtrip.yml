# Thin caller — copied into a site repo as
# `.github/workflows/cms-media-roundtrip.yml`. Owns the schedule / push
# triggers + run-name; delegates the prod media-roundtrip loop to the
# platform's reusable workflow. The e2e harness + the cms-recursion-gate /
# await-prod-deploy / post-failure-comment composites all live in the
# platform repo. Keep `platform_ref` equal to the `@vX.Y.Z` pin on the
# `uses:` line.
#
# Site identity (CMS_PROD_URL / CMS_APEX) + the PROD_PLAYGROUND_MODE
# sunset gate are read from THIS repo's VARS by the reusable workflow.
name: CMS Media Roundtrip — Prod (real upload + delete)
run-name: >-
  ${{ github.event_name == 'schedule'
        && format('scheduled — {0}', github.event.schedule)
   || github.event_name == 'push'
        && format('push — {0} @{1}', github.ref_name, github.actor)
   || format('manual — @{0}', github.actor) }}

on:
  schedule:
    - cron: '0 15 * * *'
  workflow_dispatch:
  push:
    branches: [main]
    paths:
      - .github/workflows/cms-media-roundtrip.yml
      - admin/**
      - playwright.config.js
      - package.json
      - package-lock.json
      - _config.yml
      - _layouts/post.html

permissions:
  contents: read
  pull-requests: write
  actions: read

jobs:
  media-roundtrip:
    uses: Adam-S-Daniel/cms-platform/.github/workflows/cms-media-roundtrip.yml@v0.1.1
    with:
      # Pin to the SAME ref as the `uses:` pin above so the harness matches.
      platform_ref: v0.1.1
    secrets:
      CMS_E2E_PAT: ${{ secrets.CMS_E2E_PAT }}
