name: Editorial label audit
# Daily check that no editorial-workflow PR is missing its decap-cms/<status>
# label — i.e. /admin (prod + every preview) won't show the persistent Decap
# "adding labels to N of your Editorial Workflow entries" dialog.
on:
  schedule:
    - cron: "0 13 * * *"
  workflow_dispatch:

permissions:
  contents: read
  pull-requests: read

jobs:
  audit:
    uses: Adam-S-Daniel/cms-platform/.github/workflows/editorial-label-audit.yml@v0.1.43
    with:
      platform_ref: v0.1.43
