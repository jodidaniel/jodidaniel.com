name: Editorial label audit
# Daily check that no editorial-workflow PR is missing its decap-cms/<status>
# label — i.e. /admin (prod + every preview) won't show the persistent Decap
# "adding labels to N of your Editorial Workflow entries" dialog. Since
# v0.1.52 the audit SELF-HEALS (reusable default fix: true): it applies the
# missing label itself — hence pull-requests: write — so a red run means
# "a fix didn't stick", no longer "somebody must add a label".
on:
  schedule:
    - cron: "0 13 * * *"
  workflow_dispatch:

permissions:
  contents: read
  pull-requests: write

jobs:
  audit:
    uses: Adam-S-Daniel/cms-platform/.github/workflows/editorial-label-audit.yml@v0.1.52
    with:
      platform_ref: v0.1.52
