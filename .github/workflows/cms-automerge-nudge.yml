# Thin caller — copied into a site repo as
# `.github/workflows/cms-automerge-nudge.yml`. Owns the schedule /
# workflow_dispatch triggers + run-name + concurrency lane; delegates the
# stuck-PR recovery to the platform's reusable workflow.
#
# Re-enables auto-merge every 5 minutes on any open CMS canary PR whose
# required checks are all green but whose mergeStateStatus is still
# BLOCKED (issue #1815 Blocker 1 — see the reusable's header for the
# full #1812 differential).
#
# This repo has NO `.github/rulesets/main.json` and NO `e2e/` directory (no
# local lint-lock) — those were adamdaniel.ai artifacts this comment used to
# describe by mistake. The live `main` ruleset here requires ZERO status
# checks (only `cms-feature-branches`, which gates feature-branch PRs, not
# main, requires anything: `validate-content`). So `required_contexts` below
# is NOT mirroring branch protection; it's a safety gate on the reusable's
# explicit recovery merge (see the reusable's header) — every listed context
# must be present AND green on the PR's head sha, and a context that never
# reports on this repo (the reusable's `headIsTrulyGreen` "missing on head
# sha" branch) permanently BLOCKS recovery for that PR; it is not ignored.
# The previous list (`validate-content`, `scan`, `select`, `unit`, `parity`,
# `e2e (1)`, `e2e-admin`, `finalize`, `preview-media`) never matched any real
# check-run name on this repo — checks here report as `<caller job> / <called
# job>` (e.g. `editorial / validate-content`, `scan / scan`), so the nudge's
# recovery merge could never have fired. Trimmed to the one context
# guaranteed to report, under a stable name, on every content PR this repo
# produces. `e2e / e2e` was deliberately NOT kept: it reports under a
# DIFFERENT name on docs-only PRs (`E2E (docs-only stub) / e2e`, see
# e2e-stub.yml), which would reproduce the same missing-context hazard.
#
# In practice this whole nudge is dormant here: `cms.base_collections: []`
# hides the `e2e`/`posts` collections from `/admin`, so the host-loop and
# prod-loop canary specs self-skip (cms-platform's
# e2e/cms-publish-loop.spec.js `hasE2ECanaries` guard) and this repo has
# never produced an `automated-test`-labeled PR. Kept for parity with the
# platform consumer shape in case that changes.
# Keep `@vX.Y.Z` on the `uses:` line pinned to a released platform tag.
name: CMS auto-merge nudge
run-name: >-
  ${{ github.event_name == 'schedule'
        && format('scheduled — {0}', github.event.schedule)
   || format('manual — @{0}', github.actor) }}

on:
  schedule:
    # Every 5 minutes — well under the 6h sweep threshold so a stuck PR
    # is recovered long before it would be closed. Cron load is ~288
    # runs/day, each <1 min, one GraphQL query + 0-N tiny mutations.
    - cron: "*/5 * * * *"
  workflow_dispatch:

permissions:
  contents: read
  pull-requests: read

concurrency:
  # Single global lane — only one nudge pass at a time. cancel-in-progress
  # is fine here: if a new pass starts mid-flight, the cancelled pass'
  # work is recovered by the next pass (the mutation is idempotent and
  # the next pass re-queries fresh state).
  group: cms-automerge-nudge
  cancel-in-progress: true

jobs:
  nudge:
    uses: Adam-S-Daniel/cms-platform/.github/workflows/cms-automerge-nudge.yml@v0.1.66
    with:
      # NOT branch-protection contexts (this repo's main ruleset requires
      # none) — the one check-run name guaranteed to report, correctly
      # named, on every content PR. See the header comment above for why
      # the rest of the old list was dropped.
      required_contexts: |
        editorial / validate-content
    secrets:
      CMS_E2E_PAT: ${{ secrets.CMS_E2E_PAT }}
