title: Jodi Daniel
description: "Jodi Daniel — nationally recognized leader in digital health law and policy. Regulatory strategy, health data privacy, FDA and telehealth counsel for healthcare organizations and technology innovators."
url: "https://jodidaniel.com"
baseurl: ""
author:
  name: Jodi Daniel

theme: cms-platform-theme

markdown: kramdown
highlighter: rouge
permalink: /blog/:slug/

# Render scheduled / future-dated posts. Harmless on this single-page site
# (the home page reads _data/home.yml, not site.posts) but lets the Posts
# collection + publish-scheduled-posts workflow behave as on a blog site.
future: true

cms:
  repository: jodidaniel/jodidaniel.com
  # oauth-proxy stack `jodidaniel-com-oauth-proxy` (us-east-1) ApiUrl output.
  # The rendered Decap config uses this as backend.base_url + auth_endpoint
  # prod/auth; the GitHub OAuth App callback is <base>/prod/callback.
  oauth_base_url: "https://zkrofo300b.execute-api.us-east-1.amazonaws.com"

collections:
  projects: { output: false, permalink: /projects/:slug/ }
  tags: { output: true, permalink: /tags/:slug/ }
  e2e: { output: true, permalink: /e2e/:slug/ }

defaults:
  - { scope: { path: "", type: "posts" },    values: { layout: "post" } }
  - { scope: { path: "", type: "projects" }, values: { layout: "project" } }
  - { scope: { path: "", type: "tags" },     values: { layout: "tag" } }
  - { scope: { path: "pages" },              values: { layout: "page" } }
  - { scope: { path: "", type: "e2e" },      values: { layout: "canary", sitemap: false, robots: "noindex,nofollow" } }

plugins:
  - jekyll-seo-tag
  - jekyll-feed
  - jekyll-sitemap

# ── Site-specific data / collections seam ────────────────────────────────────
# This is a single-page site: index.html uses `layout: home` (site-local
# _layouts/home.html, which shadows the gem's default layout) and reads ALL of
# its copy from site.data.home. That data lives in `_data/home.yml`, edited
# end-to-end via /admin through the "Home Page" files-collection that the
# admin/collections.site.yml seam splices into the Decap base config at the
# `# __SITE_COLLECTIONS__` marker. `_data/` is deliberately NOT excluded below,
# so Jekyll loads it into `site.data.home` automatically — no _config change
# needed when the home content changes; only the YAML data file does.

exclude:
  - Gemfile
  - Gemfile.lock
  - infrastructure
  - oauth-proxy
  - scripts
  - README.md
  - "*.env"
  # The single-page mockup is kept in the repo as the design reference for the
  # home layout + jodidaniel.css, but it is NOT a page Jekyll should publish.
  - mockup.html
  # The e2e lane checks the platform out into .cms-platform/ and (for the
  # local lane) PLACES the harness at <site>/e2e. Neither is site content;
  # excluding them keeps the harness (specs, configs, node_modules) and the
  # platform checkout out of _site so they can't pollute the build or break
  # the e2e-posts-exclusion / sitemap specs that read _site. (.cms-platform
  # is dot-prefixed so Jekyll ignores it by default; listing it is explicit.)
  - e2e
  - .cms-platform
  - platform.lock
  - admin/README.md
  - admin/collections.site.yml.example
