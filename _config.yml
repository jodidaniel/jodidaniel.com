title: Jodi Daniel
# COMING-SOON SEO (go-live content policy): while the site is gated
# (`site_live: false` in _data/settings.yml), keep this description neutral so
# {% seo %} does not leak the marketing blurb in <meta>/og:description/JSON-LD
# even though the full copy is present in the per-section data + collections.
# GO-LIVE = flip `site_live: true` in _data/settings.yml AND restore the real
# description here:
#   "Jodi Daniel — nationally recognized leader in digital health law and
#    policy. Regulatory strategy, health data privacy, FDA and telehealth
#    counsel for healthcare organizations and technology innovators."
description: "Jodi Daniel — site coming soon."
url: "https://jodidaniel.com"
baseurl: ""
author:
  name: Jodi Daniel

theme: cms-platform-theme

markdown: kramdown
highlighter: rouge
permalink: /blog/:slug/

# Render scheduled / future-dated posts. Harmless on this single-page site
# (the home page reads per-section _data/*.yml + collections, not site.posts)
# but lets the Posts collection + publish-scheduled-posts workflow behave as
# on a blog site.
future: true

cms:
  repository: jodidaniel/jodidaniel.com
  # oauth-proxy stack `jodidaniel-com-oauth-proxy` (us-east-1) ApiUrl output.
  # The rendered Decap config uses this as backend.base_url + auth_endpoint
  # prod/auth; the GitHub OAuth App callback is <base>/prod/callback.
  oauth_base_url: "https://zkrofo300b.execute-api.us-east-1.amazonaws.com"
  # Single-page bio: hide the platform's generic blog collections
  # (posts/tags/projects/pages/e2e) from /admin so Jodi sees only her own
  # section editors. `base_collections` is a KEEP-LIST; [] hides them all.
  # (Honored by cms-platform-theme >= v0.1.7.)
  base_collections: []

collections:
  projects: { output: false, permalink: /projects/:slug/ }
  tags: { output: true, permalink: /tags/:slug/ }
  e2e: { output: true, permalink: /e2e/:slug/ }
  # Per-section data collections for the bio home page. output:false → these are
  # editable content (one file per item, ordered by `weight`) read by
  # _layouts/home.html as site.expertise / site.experience / etc., NOT published
  # as standalone pages. Decap edits them via the folder collections in
  # admin/collections.site.yml.
  expertise: { output: false }
  experience: { output: false }
  accomplishments: { output: false }
  media: { output: false }
  education: { output: false }

defaults:
  - { scope: { path: "", type: "posts" },    values: { layout: "post" } }
  - { scope: { path: "", type: "projects" }, values: { layout: "project" } }
  - { scope: { path: "", type: "tags" },     values: { layout: "tag" } }
  - { scope: { path: "pages" },              values: { layout: "page" } }
  - { scope: { path: "", type: "e2e" },      values: { layout: "canary", sitemap: false, robots: "noindex,nofollow" } }

plugins:
  - jekyll-seo-tag
  - jekyll-feed
  - jekyll-sitemap

# ── Site-specific data / collections seam ────────────────────────────────────
# This single-page bio (index.html → site-local _layouts/home.html) reads its
# copy from per-section sources, ALL editable via /admin:
#   - singletons → _data/header.yml, _data/about.yml, _data/contact.yml,
#     _data/settings.yml (the latter holds the site_live GATE + coming-soon copy)
#   - repeating sections → the expertise/experience/accomplishments/media/
#     education collections above (one file per item, ordered by `weight`)
# admin/collections.site.yml splices the matching Decap file+folder collections
# into the base config at the `# __SITE_COLLECTIONS__` marker; cms.base_collections
# (above) hides the generic base collections so /admin shows only these.

exclude:
  - Gemfile
  - Gemfile.lock
  - infrastructure
  - oauth-proxy
  - scripts
  - README.md
  - "*.env"
  # The single-page mockup is kept in the repo as the design reference for the
  # home layout + jodidaniel.css, but it is NOT a page Jekyll should publish.
  - mockup.html
  # The e2e lane checks the platform out into .cms-platform/ and (for the
  # local lane) PLACES the harness at <site>/e2e. Neither is site content;
  # excluding them keeps the harness (specs, configs, node_modules) and the
  # platform checkout out of _site so they can't pollute the build or break
  # the e2e-posts-exclusion / sitemap specs that read _site. (.cms-platform
  # is dot-prefixed so Jekyll ignores it by default; listing it is explicit.)
  - e2e
  - .cms-platform
  - platform.lock
  - admin/README.md
  - admin/collections.site.yml.example
